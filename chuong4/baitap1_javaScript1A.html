<!DOCTYPE html>
<html>
<head>
    <title>Bài tập JavaScript 1A</title>
</head>
<body>
    <script language="JavaScript">
        // Khai báo 2 biến để lưu tên và tuổi
        var Ten, Tuoi; 

        // Nhập dữ liệu từ người dùng
        Ten = prompt("Bạn hãy nhập vào tên", "");
        Tuoi = prompt("Bạn hãy nhập vào Tuổi : ", 20);

        // Xuất ra trang web bằng hàm document.write
        document.write("Chào bạn : <b>" + Ten + "</b>"); // <b> làm in đậm
        document.write("<BR>"); // Xuống dòng
        document.write("Tuổi của bạn là : <u>" + Tuoi + "</u>"); // <u> làm gạch chân
    </script>
</body>
</html>
