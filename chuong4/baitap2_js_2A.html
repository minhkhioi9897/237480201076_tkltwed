<!DOCTYPE html>
<html>
<head>
    <title>Bài tập JavaScript - Button</title>
</head>
<BODY>
    <script language="JavaScript">
        // Viết dòng chữ tiêu đề ra trang web
        document.write("<h1> Tao Button bằng Script </h1><BR>");

        // Định nghĩa hàm để hiện cửa sổ thông báo
        function thongbao(txt) 
        {
            alert(txt);
        }
    </script>

    <form>
        <input type="button" name="callthongbao" value="Thông báo" 
               onclick="thongbao('Welcome to javascript!')">
    </form>
</BODY>
</html>
