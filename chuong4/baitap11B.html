<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thây màu nền bằng lick chuột</title>
</head>
<body>
    <h2>Thay đổi màu nền sử dụng đối tượng document</h2>
    <input type="button" name="Mauxanhla" value="Màu Xanh Lá" onclick="document.bgColor = 'gree'">
    <input type="button" name="Mauxanhduong" value="Màu Xanh Dương" onclick="document.bgColor = 'blue'">
    <input type="button" name="Mauvanh" value="Màu Vàng" onclick="document.bgColor = 'yellow'">
</body>
</html>
